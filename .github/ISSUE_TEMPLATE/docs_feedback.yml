name: Docs feedback
description: Suggest an improvement to docs or examples
title: "[Docs]: "
labels: [documentation]
body:
  - type: input
    id: page
    attributes:
      label: Page or file
  - type: textarea
    id: unclear
    attributes:
      label: What was unclear?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
