name: Examples check

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: bash -n examples/curl/chat-completion.sh
      - run: cd examples/node && npm install && node --check openai-sdk.mjs
      - run: python -m py_compile examples/python/openai_sdk.py
